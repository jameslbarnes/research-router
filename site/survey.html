<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The recall survey &middot; a prototype</title>
<style>
:root{
  --bg0:#ffffff;
  --ink:#18161f; --ink-dim:#55505f; --ink-faint:#8f8b9a;
  --accent:#0a6cff; --ok:#12a06a; --warn:#c5870c; --err:#d23b3b;
  --hard:#15131f; --card-line:rgba(20,16,40,0.30);
  --serif:"Iowan Old Style","Palatino","Georgia",serif;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--sans); color:var(--ink); -webkit-font-smoothing:antialiased;
  background:
    repeating-linear-gradient(0deg, rgba(20,16,40,0.035) 0 1px, transparent 1px 26px),
    repeating-linear-gradient(90deg, rgba(20,16,40,0.035) 0 1px, transparent 1px 26px),
    #ffffff;
  line-height:1.6; padding:40px 20px 80px;
}
.wrap{max-width:680px;margin:0 auto;}
.eyebrow{font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.18em;color:var(--accent);margin-bottom:14px;}
h1{font-family:var(--serif);font-weight:700;font-size:30px;line-height:1.15;letter-spacing:-.3px;margin-bottom:12px;}
h3{font-family:var(--serif);font-weight:650;font-size:19px;margin-bottom:6px;}
p.body{font-size:15px;line-height:1.7;color:var(--ink-dim);margin-bottom:12px;}
p.body b{color:var(--ink);}
.small{font-size:12.5px;color:var(--ink-faint);}
.panel{background:#fff;border:2px solid var(--hard);box-shadow:7px 7px 0 var(--hard);padding:26px 28px;margin-top:18px;}
.btn{font-family:var(--sans);font-size:14px;font-weight:600;padding:11px 20px;border:2px solid var(--hard);
  background:#fff;color:var(--ink);box-shadow:4px 4px 0 var(--hard);cursor:pointer;
  transition:transform .08s,box-shadow .08s;}
.btn:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 var(--hard);}
.btn.primary{background:linear-gradient(135deg,var(--accent),#0a4ecf);color:#fff;}
.btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:4px 4px 0 var(--hard);}
.progress{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px;}
.itemtag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  border:1.5px solid var(--hard);padding:3px 9px;background:#fff;color:var(--ink);margin-bottom:12px;}
.qlabel{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin:18px 0 8px;}
.opts{display:flex;gap:10px;flex-wrap:wrap;}
.opt{font-family:var(--sans);font-size:13.5px;font-weight:600;padding:9px 16px;border:2px solid var(--card-line);
  background:#fff;color:var(--ink-dim);cursor:pointer;}
.opt:hover{border-color:var(--hard);color:var(--ink);}
.opt.sel{border-color:var(--accent);color:var(--accent);box-shadow:3px 3px 0 var(--accent);}
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:24px;}
.stat{display:inline-block;margin:0 18px 0 0;}
.stat .v{font-family:var(--mono);font-weight:700;font-size:28px;line-height:1;color:var(--ink);}
.stat .l{font-size:12px;color:var(--ink-dim);margin-top:4px;}
.badge{display:inline-block;font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 8px;border:1.5px solid;margin-right:8px;}
.badge.surfaced{color:var(--accent);border-color:var(--accent);}
.badge.real{color:var(--warn);border-color:var(--warn);}
.badge.decoy{color:var(--err);border-color:var(--err);}
.rrow{border-top:1px solid rgba(20,16,40,.09);padding:10px 0;font-size:13px;color:var(--ink-dim);}
.rrow b{color:var(--ink);font-size:13.5px;}
.rrow .you{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:2px;display:block;}
.pgrid{display:grid;grid-template-columns:150px 1fr;gap:12px 14px;align-items:center;margin-top:14px;}
.plab{font-size:13.5px;color:var(--ink-dim);line-height:1.35;}
.pbar{display:flex;align-items:center;gap:8px;}
.cbar{height:22px;border:1.5px solid var(--hard);}
.cbar.ink{background:var(--ink);}
.cbar.acc{background:var(--accent);}
.cval{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--ink);white-space:nowrap;}
.paxis{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);border-top:1.5px solid var(--card-line);padding-top:5px;margin-top:12px;}
a{color:var(--accent);text-decoration:none;} a:hover{opacity:.7;}
.backlink{font-family:var(--mono);font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;}
</style>
</head>
<body>
<div class="wrap">
  <a class="backlink" href="index.html">&larr; The Research Router</a>
  <div style="height:22px"></div>
  <div class="eyebrow">Measuring recall &middot; an interactive prototype</div>
  <div id="app"></div>
  <div style="height:26px"></div>
  <p class="small">A prototype of the end-of-trial instrument. All items are illustrative, nothing you answer is stored, and the arm-level numbers on the results screen are the expected pattern, not data.</p>
</div>

<script>
var ITEMS = [
  {tag:"ePrint preprint", status:"surfaced",
   title:"Tighter concrete security for lattice-based threshold signatures",
   blurb:"Revises the reduction most implementations cite, shaving the parameter sizes the old bound forced."},
  {tag:"Bulletin-board entry", status:"surfaced",
   title:"Why our batched ORAM construction died: a write-amplification counterexample",
   blurb:"A signed entry from a nearby group documenting the counterexample that killed a promising design."},
  {tag:"Tool release", status:"surfaced",
   title:"oblivfetch 0.3 — oblivious retrieval with GPU batching",
   blurb:"A library release a colleague's session vetted and wrote up; claims order-of-magnitude latency wins."},
  {tag:"Post", status:"surfaced",
   title:"Thread: three pitfalls when verifying TEE attestation quotes in production",
   blurb:"A widely shared thread linking a new audit of quote-verification implementations."},
  {tag:"arXiv preprint", status:"real",
   title:"Sublinear zero-knowledge proofs for RAM programs",
   blurb:"An adjacent-subfield result with implications for verifiable outsourced storage."},
  {tag:"Post", status:"real",
   title:"CFP: private information retrieval workshop co-located with SBC",
   blurb:"A call for papers circulating in the community this month."},
  {tag:"ePrint preprint", status:"real",
   title:"Garbled RAM with constant overhead: a simplification",
   blurb:"A cleaner presentation of a known construction, with a smaller constant."},
  {tag:"ePrint preprint", status:"decoy",
   title:"Post-quantum oblivious shuffles from isogeny walks",
   blurb:"Claims an oblivious shuffle whose security rests on isogeny-walk hardness."},
  {tag:"Tool release", status:"decoy",
   title:"tee-bench 1.2 — an attestation-latency benchmarking suite",
   blurb:"A benchmarking harness for comparing attestation flows across vendors."},
  {tag:"Bulletin-board entry", status:"decoy",
   title:"Reducing decoy traffic in mix-nets via learned padding schedules",
   blurb:"A signed entry proposing learned padding to cut mix-net bandwidth overhead."}
];

var answers = ITEMS.map(function(){ return {remember:null, useful:null}; });
var step = -1; // -1 intro, 0..n-1 items, n reveal
var app = document.getElementById('app');

function h(html){ app.innerHTML = html; window.scrollTo(0,0); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function intro(){
  step = -1;
  h('<h1>Did it reach you?</h1>' +
    '<p class="body">Imagine you are an applied-cryptography researcher at the end of the trial window. Below are <b>10 items</b> that may or may not have been live in your field during the trial: preprints, posts, tools, and bulletin-board entries. For each one, answer two questions honestly. It takes about two minutes.</p>' +
    '<p class="body">Some items were surfaced by the Router, some existed but were never surfaced, and some are fabricated. Which is which is revealed at the end — along with how the trial turns your answers into a number.</p>' +
    '<div class="navrow"><button class="btn primary" onclick="next()">Begin &rarr;</button>' +
    '<button class="btn" onclick="demo()">Skip to a sample result</button></div>');
}

function item(){
  var it = ITEMS[step], a = answers[step];
  h('<div class="progress">Item ' + (step+1) + ' / ' + ITEMS.length + '</div>' +
    '<div class="panel">' +
    '<span class="itemtag">' + esc(it.tag) + '</span>' +
    '<h3>' + esc(it.title) + '</h3>' +
    '<p class="body" style="margin-bottom:0">' + esc(it.blurb) + '</p>' +
    '<div class="qlabel">Do you remember encountering this during the trial?</div>' +
    '<div class="opts">' + opt('remember','yes','Yes') + opt('remember','no','No') + '</div>' +
    '<div class="qlabel">Would this be useful to your work?</div>' +
    '<div class="opts">' + opt('useful','yes','Yes') + opt('useful','somewhat','Somewhat') + opt('useful','no','No') + '</div>' +
    '</div>' +
    '<div class="navrow">' +
    '<button class="btn" onclick="back()"' + (step===0?' disabled':'') + '>&larr; Back</button>' +
    '<button class="btn primary" id="nextbtn" onclick="next()"' + ((a.remember&&a.useful)?'':' disabled') + '>' +
    (step===ITEMS.length-1 ? 'See results &rarr;' : 'Next &rarr;') + '</button></div>');
}

function opt(q,val,label){
  var sel = answers[step][q]===val ? ' sel' : '';
  return '<button class="opt'+sel+'" onclick="pick(\''+q+'\',\''+val+'\')">'+label+'</button>';
}

function pick(q,val){ answers[step][q]=val; item(); }
function back(){ if(step>0){ step--; item(); } }
function next(){ step++; step<ITEMS.length ? item() : reveal(); }

function demo(){
  ITEMS.forEach(function(it,i){
    var surf = it.status==='surfaced';
    answers[i].remember = surf ? 'yes' : (it.status==='real' && i===4 ? 'yes' : 'no');
    answers[i].useful = surf ? (i===3 ? 'somewhat' : 'yes') : (i%2 ? 'somewhat' : 'no');
  });
  step = ITEMS.length; reveal();
}

function reveal(){
  var real = 0, realRemembered = 0, decoys = 0, decoysClaimed = 0, usefulRemembered = 0;
  ITEMS.forEach(function(it,i){
    var a = answers[i];
    if(it.status==='decoy'){ decoys++; if(a.remember==='yes') decoysClaimed++; }
    else { real++; if(a.remember==='yes'){ realRemembered++; if(a.useful!=='no') usefulRemembered++; } }
  });
  var recall = Math.round(100*realRemembered/real);
  var overclaim = Math.round(100*decoysClaimed/decoys);
  var corrected = Math.max(0, recall-overclaim);
  var useful = realRemembered ? Math.round(100*usefulRemembered/realRemembered) : 0;

  var rows = ITEMS.map(function(it,i){
    var a = answers[i];
    var badge = it.status==='surfaced' ? '<span class="badge surfaced">Surfaced</span>' :
                it.status==='real' ? '<span class="badge real">Real, not surfaced</span>' :
                '<span class="badge decoy">Decoy</span>';
    return '<div class="rrow">'+badge+'<b>'+esc(it.title)+'</b>' +
      '<span class="you">you: remember — '+(a.remember||'—')+' &middot; useful — '+(a.useful||'—')+'</span></div>';
  }).join('');

  h('<h1>How your answers become the DV</h1>' +
    '<div class="panel">' +
    '<div class="stat"><div class="v">'+recall+'%</div><div class="l">raw recall<br/>(real items remembered)</div></div>' +
    '<div class="stat"><div class="v">'+overclaim+'%</div><div class="l">over-claim<br/>(decoys "remembered")</div></div>' +
    '<div class="stat"><div class="v">'+corrected+'%</div><div class="l">corrected recall<br/>(raw minus over-claim)</div></div>' +
    '<div class="stat"><div class="v">'+useful+'%</div><div class="l">of remembered items<br/>rated useful</div></div>' +
    '</div>' +
    '<div class="panel">' +
    '<h3>What the trial reads out</h3>' +
    '<p class="body">Every participant in every arm takes this survey against the same item pool, drawn from logged traces. The dependent variable is the <b>gap between arms</b> in corrected recall of useful items. The expected pattern:</p>' +
    '<div class="pgrid">' +
    '<div class="plab">Arm A &middot; consumer chat</div><div class="pbar"><div class="cbar ink" style="width:21%"></div><div class="cval">~20%</div></div>' +
    '<div class="plab">Arm B &middot; frontier seat</div><div class="pbar"><div class="cbar ink" style="width:27%"></div><div class="cval">~26%</div></div>' +
    '<div class="plab">Arm C &middot; + the Router</div><div class="pbar"><div class="cbar acc" style="width:65%"></div><div class="cval">~63%</div></div>' +
    '</div>' +
    '<div class="paxis">corrected recall of useful items &middot; illustrative, not data</div>' +
    '<p class="body" style="margin-top:14px;margin-bottom:0">Recall barely moves from A to B: a stronger model does not know what your colleague posted on Tuesday. The jump at C is the delta the Router owns. Quality of real work stays the primary endpoint, blind-scored; this survey is the recall endpoint beside it.</p>' +
    '</div>' +
    '<div class="panel"><h3>The unmasking</h3>' + rows + '</div>' +
    '<div class="navrow"><button class="btn" onclick="restart()">Start over</button>' +
    '<a class="btn primary" href="index.html#trial">Back to the trial &rarr;</a></div>');
}

function restart(){ answers = ITEMS.map(function(){ return {remember:null,useful:null}; }); intro(); }
intro();
</script>
</body>
</html>
